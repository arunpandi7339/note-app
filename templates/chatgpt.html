<body>

<div class="container">

<h2>My Notes</h2>

<button onclick="toggleTheme()">🌙 Toggle Mode</button>

<input id="search" placeholder="Search..." onkeyup="loadNotes()">

<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write note"></textarea>

<button onclick="createNote()">Add Note</button>
<button onclick="logout()">Logout</button>

<div id="notes"></div>

</div>

<script>
const API = "http://127.0.0.1:5000";
const token = localStorage.getItem("token");

let editId = null;

if(!token){
    window.location.href="index.html";
}

// 🌙 THEME
function toggleTheme(){
    document.body.classList.toggle("light");
}

// LOAD NOTES + SEARCH
async function loadNotes(){
    let res = await fetch(API + "/notes/data",{
        headers:{ "Authorization":"Bearer "+token }
    });

    let data = await res.json();
    let search = document.getElementById("search").value.toLowerCase();

    let html="";

    data.forEach(n=>{
        if(n.note_title.toLowerCase().includes(search)){
            html += `
            <div class="note">
                <h3>${n.note_title}</h3>
                <p>${n.notes_content}</p>
                <button onclick="editNote('${n.note_id}','${n.note_title}','${n.notes_content}')">Edit</button>
                <button onclick="deleteNote('${n.note_id}')">Delete</button>
            </div>`;
        }
    });

    document.getElementById("notes").innerHTML = html;
}

// CREATE / UPDATE
async function createNote(){

    let url = editId ? "/note/update" : "/note/create";
    let method = editId ? "PUT" : "POST";

    let body = {
        note_title:title.value,
        notes_content:content.value
    };

    if(editId){
        body.note_id = editId;
    }

    await fetch(API + url,{
        method:method,
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify(body)
    });

    editId = null;
    title.value="";
    content.value="";

    loadNotes();
}

// EDIT
function editNote(id, t, c){
    editId = id;
    title.value = t;
    content.value = c;
}

// DELETE
async function deleteNote(id){
    await fetch(API + "/note/delete",{
        method:"DELETE",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify({note_id:id})
    });

    loadNotes();
}

// LOGOUT
function logout(){
    localStorage.removeItem("token");
    window.location.href="index.html";
}

loadNotes();
</script>

</body>
</html> -->
