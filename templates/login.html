<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#294989;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    
}



.container{
    text-align:center;

    animation-name: opas;
    animation-duration: 2s;
    animation-iteration-count: 1;
}

@keyframes opas {
    0%{
        transform: translateY(20px);
        opacity: 0;
    }
    100%{
        transform: translateX(0);
        opacity: 1;
    }
}

.logo{
    width:60px;
    height:60px;
    background:#d1d5db;
    border-radius:10px;
    margin:0 auto 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
}

h1{
    font-size:24px;
    margin-bottom:5px;
}

.subtitle{
    font-size:12px;
    color:#99a4bb;
    letter-spacing:1px;
    margin-bottom:25px;
}

.card{
    border:2px solid #000000;
    background:#ffffffe2;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
    text-align:left;
    box-shadow: 0px 0px 20px #000000;
}

label{
    font-size:12px;
    color:#6b7280d5;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:1px solid #e5e7eb;
    border-radius:6px;
    background:#f9fafb;
}

.password-row{
    position:relative;
}

.show-btn{
    position:absolute;
    right:10px;
    top:20px;
    font-size:12px;
    cursor:pointer;
    color:#6b7280;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4b5563;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#374151;
}

.footer-text{
    text-align:center;
    font-size:12px;
    margin-top:20px;
}

#msg{
    color:red;
    font-size:12px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

    <div class="logo">✏️</div>

    <h1>The Curated Slate</h1>
    <div class="subtitle">ELEVATED NOTE-TAKING</div>

    <form onsubmit="login(event)">
        <div class="card">
            <h2>Login</h2>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Password</label>
            <div class="password-row">
                <input type="password" id="password" placeholder="password"  required>
                <!-- <span class="show-btn" onclick="togglePassword()">Show</span> -->
            </div>

            <button type="submit" id="btn">Login</button>

            <div class="footer-text">
                New here? <a href="/templates/register.html">Register</a>
            </div>

            <p id="msg"></p>
        </div>
    </form>

</div>

<script>

function togglePassword() {
    const pass = document.getElementById("password")
    pass.type = pass.type === "password" ? "text" : "password"
}

async function login(event) {
    event.preventDefault()

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value
    const msg = document.getElementById("msg")
    const btn = document.getElementById("btn")

    msg.innerText = ""

    if (!email || !password) {
        msg.innerText = "All fields are required"
        return
    }

    btn.disabled = true
    btn.innerText = "Logging in..."

    try {
        const res = await fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "email":email,
                "password":password
            })
        })

        const data = await res.json()

        if (res.ok) {
            // ✅ Correct token save
            localStorage.setItem("token", data.token)
            alert("Login successful")

            window.location.href = "/templates/note.html"
        } else {
            msg.innerText = data.msg || "Invalid email or password"
        }

    } catch (error) {
        console.log(error)
        msg.innerText = "Server error"
    }

    btn.disabled = false
    btn.innerText = "Login"
}
</script>

</body>
</html>
