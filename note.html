<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Note</title>


<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
    font-family: 'Times New Roman', Times, serif;
}

body{
    min-height: 100vh;
    background-image:url("image/olgavolkovitskaia-notepad-6980493_1920.jpg");
    font-family: Arial, Helvetica, sans-serif;
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
}
/* NAVBAR */
nav{
    display: flex;
    justify-content: space-between;
    padding: 1rem 2rem;
    background-color: rgb(146, 131, 112);
    border-bottom:2px solid rgba(255, 255, 255, 0.758) ;
    color: rgb(0, 0, 0);
    position: sticky;
    top: 0;
    z-index: 1;
}

.nav-link{
    display: flex;
    gap:1rem;
    font-size: 1.2rem; 
    align-items: center;
}

a{
    text-decoration: none;
    color: white;
}

/* NOTE BOX */
.note-box{
    background-color: rgba(143, 120, 79, 0.552);
    border-radius:1rem;
    width:50%;
    margin: 80px auto;
    border: 2px solid rgba(255, 255, 255, 0.456);
    display: flex;
    flex-direction: column;
}

h2{
    background-color: rgb(143, 90, 0);
    padding: 1rem;
    border-radius: 1rem 1rem 0 0 ;
    font-size:2rem;
    text-align: center;
    border-bottom: 2px solid rgba(0, 0, 255, 0.758);
}

label{
    font-size: 1.2rem;
    margin-top:1rem;
    margin-left:1rem;
}

#note-title, textarea{
    background-color: rgba(245, 245, 245, 0.753);
    margin:1rem 2rem;
    padding: 10px;
    border-radius: 0.5rem;
    font-size: 1rem;
}

#note-title:hover{
    background-color: white;
} 
textarea:hover{
    background-color: white;
}

textarea{
    resize: none;
}

/* BUTTON */
.save-button{
    margin: 1rem 2rem;
    padding: 10px;
    border-radius: 0.5rem;
    cursor: pointer;
    background-color: rgb(33, 0, 154);
    color: white;
    border: none;
}

.save-button:hover{
    background-color: rgb(0, 80, 160);
}

/* NOTE LIST */
#note-list{
    margin-bottom: 1rem;
}

li{
    position: relative;
    list-style: none;
    background-color: rgba(255, 255, 255, 0.673);
    margin:0.5rem 2rem;
    padding: 10px;
    border-radius: 0.5rem;
    border: 2px solid rgb(211, 211, 211);
    box-shadow: inset 0px 0px 5px gray;
}
li:hover{
    background-color: rgba(240, 248, 255, 0.767);
}

/* .notes{
    max-height: 50px;
    overflow: hidden;
} */

.notes {
    max-height: 50px;
    overflow: hidden;
    white-space: pre-wrap;   /* line breaks correct-ah varum */
    word-break: break-word;  /* long text break aagum */
    transition: max-height 0.3s ease;
}

.logout{
    padding: 0.333rem ;
    border-radius:1rem;
    cursor: pointer;
    background:linear-gradient(rgb(210, 12, 174),rgb(12, 154, 210));
    color: aliceblue;
}

/* OPEN BUTTON */
.open-but{
    position: absolute;
    top:1rem;
    right: 1rem;
    padding: 0.3rem;
    border-radius: 0.5rem;
    cursor: pointer;
    background-color: rgb(2, 2, 152);
    color: white;
    border: none;
}

.open-but2{
    margin-top: 0.3rem;
    padding: 0.3rem;
    border-radius: 0.5rem;
    cursor: pointer;
    background-color: rgb(26, 86, 0);
    color: white;
    border: none;    
}
.open-but2:hover{
    background-color: rgb(36, 120, 0);
    box-shadow: 3px 3px 3px black;
}

.open-but2:active{
    scale: calc(0.92);
}



/* 📱 RESPONSIVE */
@media (max-width: 768px){

    .note-box{
        width: 90%;
        margin: 40px auto;
    }

    nav{
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .nav-link{
        justify-content: center;
        flex-wrap: wrap;
    }

    h2{
        font-size: 1.5rem;
    }
}
</style>
</head>

<body>

<nav>
    <h1><i>Note App</i></h1>
    <div class="nav-link">
        <h4 id="user_id"></h4>
        <a href="">Profile</a>
        <button class="logout" onclick="logout()">logout</button>
    </div>
</nav>

<section>
<div class="note-box">

    <h2>My Note</h2>
    

    <label>Note Title:</label>
    <input type="text" id="note-title" placeholder="Title" required>

    <label>Note:</label>
    <textarea id="note" placeholder="Enter your note" rows="4" required></textarea>

    <button onclick="saveNote()" class="save-button">Save</button>

    <ul id="note-list"></ul>

</div>
</section>

<script>

    const API = "https://note-app-1-1ceo.onrender.com"
    const token = localStorage.getItem("token")

// 🔐 check login ==============================================================================>
    if (!token) {
        window.location.href = "login.html"
    }


// ✅ GET PROFILE  =============================================================================>
    async function getProfile() {

        if (!token) {
            return logout()
        }

        try {
            const response = await fetch(`${API}/profile`, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })

            if(!response.ok) {
            logout()
            return
        }
        const data = await response.json()
        document.getElementById("user_id").innerText = "Welcome " + data.username
        } 
        catch (error) {
            console.log(error)
            logout()
        }
    }

// ✅ LOAD NOTES  ============================================================>
    async function loadNotes() {
        try {
            const res = await fetch(`${API}/notes/data`, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })

            if (res.status === 401) {
            logout()
            return
        }
            const data = await res.json()
            const list = document.getElementById("note-list")
            list.innerHTML = ""



            data.forEach(note => {
                let li = document.createElement("li");

                let safeTitle = note.note_title.replace(/'/g, "\\'");
                let safeContent = note.notes_content.replace(/'/g, "\\'");

                li.innerHTML = `
                    <h4>${safeTitle}</h4>
                    <p class="notes">${safeContent}</p>
                    <button class="open-but" onclick="toggleNote(this)">Open</button>
                    <button class="open-but2" onclick="editNote('${note.note_id}','${safeTitle}','${safeContent}')">✏️ Edit</button> 
                    <button class="open-but2" onclick="deleteNote('${note.note_id}')">❌ Delete</button>
                `;

                list.appendChild(li);
            });

        } catch (err) {
            console.log(err)
            logout()

        }
    }

    // ✅ SAVE NOTE (backend)
    async function saveNote() {

        let title = document.getElementById("note-title").value.trim()
        let note = document.getElementById("note").value.trim()

        if (!title || !note) {
            alert("Please enter title and note")
            return
        }

        try {
            const res = await fetch(`${API}/note/create`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    note_title: title,        // ✅ FIX
                    notes_content: note 
                })
            })

            if (res.ok) {
                loadNotes() // reload notes
            }

        } catch (err) {
            console.log(err)
            logout()
        }

        // clear input
        document.getElementById("note-title").value = ""
        document.getElementById("note").value = ""
    }

    // 🔓 LOGOUT
    function logout() {
        localStorage.removeItem("token")
        window.location.href = "/index.html"
    }

    function toggleNote(btn) {
    let noteText = btn.parentElement.querySelector(".notes");

    if (!noteText.style.maxHeight || noteText.style.maxHeight === "50px") {
        noteText.style.maxHeight = "none";
        btn.innerText = "Close";
    } else {
        noteText.style.maxHeight = "50px";
        btn.innerText = "Open";
    }
}

    // 🚀 AUTO LOAD
    getProfile()
    loadNotes()


function editNote(id, title, content) {
        
        document.getElementById("note-title").value = title;
        document.getElementById("note").value = content;

        // css style change
        const btn = document.querySelector(".save-button")
        btn.innerText = "Update"
        btn.onclick = async function () {
            try {
                const res = await fetch(`${API}note/update`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + localStorage.getItem("token")
                    },
                    body: JSON.stringify({
                        note_id: id,
                        note_title: document.getElementById("note-title").value,
                        notes_content: document.getElementById("note").value
                    })
                })

                const data = await res.json()

                if(res.ok){
                    alert("update successfull")
                    loadNotes()

                    btn.innerText = "Save"
                    btn.onclick = saveNote

                    document.getElementById("note-title").value ="";
                    document.getElementById("note").value ="";
                }
                
            }

            catch (err) {
                console.log(err)
                logout()
            }

        }};


async function deleteNote(id) {

        const confirmDelete = confirm("Delete this note?")
        if (!confirmDelete) return

            try {
                const res = await fetch(`${API}/note/delete`, {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + localStorage.getItem("token")
                    },
                    body: JSON.stringify({
                        note_id: id,
                    })
                })

                const data = await res.json()

                if(res.ok){
                    alert("Deleted 🗑️")
                    loadNotes()
                }
                else{
                    alert(data.msg)
                }
                
            }

            catch (err) {
                console.log(err)
                logout()
            }

        };


</script>

</body>
</html>
